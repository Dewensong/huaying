<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#115E59"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="50%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="subtitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="blob1">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="280" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="180" cy="140" r="200" fill="url(#blob1)"/>
  <circle cx="780" cy="140" r="160" fill="url(#blob2)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.5" fill="#14B8A6"/>
    </pattern>
    <rect width="960" height="280" fill="url(#dots)"/>
  </g>

  <!-- Logo icon - video camera -->
  <g transform="translate(280, 80)">
    <rect width="64" height="64" rx="16" fill="url(#title)" opacity="0.9"/>
    <g transform="translate(12, 16)">
      <!-- Camera body -->
      <rect x="2" y="8" width="26" height="16" rx="3" fill="white" opacity="0.95"/>
      <!-- Lens -->
      <circle cx="15" cy="16" r="4" fill="#0F172A" opacity="0.8"/>
      <!-- Side bar -->
      <path d="M28 12l12-5v18l-12-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
    </g>
  </g>

  <!-- Title -->
  <text x="370" y="105" font-family="Inter, -apple-system, sans-serif" font-size="42" font-weight="800" fill="url(#title)" filter="url(#glow)">话映 Huaying</text>

  <!-- Subtitle -->
  <text x="370" y="140" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#94A3B8">AI 口播视频自动生成平台</text>

  <!-- Pipeline flow -->
  <g transform="translate(200, 190)" opacity="0.6">
    <!-- Arrow flow: Script → AI → Video -->
    <rect x="0" y="12" width="100" height="36" rx="18" fill="none" stroke="#14B8A6" stroke-width="1.5"/>
    <text x="50" y="36" font-family="Inter, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">📝 文案</text>

    <line x1="105" y1="30" x2="145" y2="30" stroke="#14B8A6" stroke-width="1.5" stroke-dasharray="4,3"/>

    <rect x="150" y="12" width="100" height="36" rx="18" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="200" y="36" font-family="Inter, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">🤖 AI 合成</text>

    <line x1="255" y1="30" x2="295" y2="30" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>

    <rect x="300" y="12" width="100" height="36" rx="18" fill="none" stroke="#14B8A6" stroke-width="1.5"/>
    <text x="350" y="36" font-family="Inter, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">🎬 视频</text>
  </g>

  <!-- Bottom decorative line -->
  <rect x="200" y="270" width="560" height="2" rx="1" fill="url(#subtitle)" opacity="0.4"/>
</svg>
